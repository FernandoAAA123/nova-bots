<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BreadDex Bot</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, onValue, push, remove, update, onChildAdded, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyApMNWmt8czi1WVbddSBfkA1oskaZ4G1i4",
    authDomain:        "nova-chat-app-b32e3.firebaseapp.com",
    databaseURL:       "https://nova-chat-app-b32e3-default-rtdb.firebaseio.com",
    projectId:         "nova-chat-app-b32e3",
    storageBucket:     "nova-chat-app-b32e3.firebasestorage.app",
    messagingSenderId: "919535150097",
    appId:             "1:919535150097:web:7c54d32b488107d54e7db0"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getDatabase(app);
  const provider = new GoogleAuthProvider();

  window._db=db; window._auth=auth;
  window._fbRef=ref; window._fbSet=set; window._fbGet=get;
  window._fbOnValue=onValue; window._fbPush=push;
  window._fbRemove=remove; window._fbUpdate=update;
  window._fbOnChildAdded=onChildAdded;
  window._fbServerTimestamp=serverTimestamp;
  window._fbSignIn=()=>signInWithPopup(auth,provider);
  window._fbSignOut=()=>signOut(auth);
  window._fbOnAuth=(cb)=>onAuthStateChanged(auth,cb);
  window._firebaseReady=true;
  document.dispatchEvent(new Event('firebase-ready'));
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
:root{--bg-0:#0b0b0f;--bg-1:#111117;--bg-2:#17171f;--bg-3:#1e1e28;--bg-4:#262632;--accent:#f59e0b;--accent-h:#d97706;--accent-glow:rgba(245,158,11,.2);--green:#10b981;--red:#f43f5e;--text-0:#f1f1f8;--text-1:#c8c8e0;--text-2:#7878a0;--text-3:#4a4a68;--border:rgba(255,255,255,.06);--font:'Plus Jakarta Sans',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg-0);color:var(--text-1);min-height:100vh;display:flex;flex-direction:column;}
#auth-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg-0);z-index:100;}
.auth-box{background:var(--bg-2);border:1px solid var(--border);border-radius:20px;padding:40px;text-align:center;width:380px;}
.auth-box h1{font-size:1.4rem;font-weight:800;color:var(--text-0);margin-bottom:8px;}
.auth-box p{color:var(--text-2);font-size:.875rem;margin-bottom:24px;}
.btn{padding:10px 20px;border-radius:10px;border:none;font-family:var(--font);font-size:.875rem;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:8px;}
.btn-google{background:var(--bg-3);color:var(--text-1);border:1.5px solid var(--border);width:100%;}
.btn-google:hover{border-color:var(--accent);}
.btn-primary{background:var(--accent);color:#000;font-weight:700;}
.btn-ghost{background:var(--bg-3);color:var(--text-1);border:1px solid var(--border);}
.btn-danger{background:rgba(244,63,94,.1);color:var(--red);border:1px solid rgba(244,63,94,.2);}
.btn-sm{padding:5px 12px;font-size:.78rem;border-radius:6px;}

/* LAYOUT */
#app{display:none;flex-direction:column;min-height:100vh;}
#app.visible{display:flex;}
.topbar{background:var(--bg-1);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px;}
.bot-avatar{width:40px;height:40px;border-radius:12px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:1.3rem;box-shadow:0 4px 12px var(--accent-glow);}
.bot-info h1{font-size:1rem;font-weight:800;color:var(--text-0);}
.bot-info p{font-size:.75rem;color:var(--text-2);}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:4px;display:inline-block;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.main{display:grid;grid-template-columns:320px 1fr;gap:20px;padding:24px;flex:1;max-width:1200px;width:100%;margin:0 auto;}

/* SETUP PANEL */
.panel{background:var(--bg-2);border:1px solid var(--border);border-radius:14px;padding:20px;}
.panel h2{font-size:.95rem;font-weight:700;color:var(--text-0);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-2);margin-bottom:6px;}
.form-group select,.form-group input{width:100%;background:var(--bg-3);border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text-0);font-family:var(--font);font-size:.875rem;outline:none;}
.form-group select:focus,.form-group input:focus{border-color:var(--accent);}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.toggle-row:last-child{border-bottom:none;}
.toggle-label{font-size:.875rem;color:var(--text-1);}
.toggle{width:40px;height:22px;background:var(--bg-4);border-radius:11px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--green);}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;}
.toggle.on::after{left:20px;}
.server-item{background:var(--bg-3);border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:background .15s;border:1.5px solid transparent;}
.server-item:hover{background:var(--bg-4);}
.server-item.selected{border-color:var(--accent);background:var(--bg-3);}
.server-name{font-size:.875rem;font-weight:600;color:var(--text-0);}
.server-meta{font-size:.72rem;color:var(--text-3);}

/* LOG */
.log-area{display:flex;flex-direction:column;gap:0;}
.log-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.log-scroll{background:var(--bg-1);border:1px solid var(--border);border-radius:10px;height:500px;overflow-y:auto;padding:12px;font-family:monospace;font-size:.8rem;display:flex;flex-direction:column;gap:6px;}
.log-entry{padding:6px 10px;border-radius:6px;line-height:1.4;}
.log-entry.info{background:rgba(59,130,246,.08);color:#93c5fd;border-left:2px solid #3b82f6;}
.log-entry.success{background:rgba(16,185,129,.08);color:#6ee7b7;border-left:2px solid var(--green);}
.log-entry.warn{background:rgba(245,158,11,.08);color:#fde68a;border-left:2px solid var(--accent);}
.log-entry.error{background:rgba(244,63,94,.08);color:#fda4af;border-left:2px solid var(--red);}
.log-entry.system{background:rgba(124,58,237,.08);color:#c4b5fd;border-left:2px solid #7c3aed;}
.log-time{opacity:.5;margin-right:8px;}

/* ACTIVE SPAWNS */
.spawns-area{margin-top:20px;}
.spawn-card{background:var(--bg-2);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;gap:12px;align-items:center;margin-bottom:8px;}
.spawn-img{width:56px;height:56px;border-radius:8px;background:var(--bg-3);display:flex;align-items:center;justify-content:center;font-size:1.8rem;overflow:hidden;flex-shrink:0;}
.spawn-img img{width:100%;height:100%;object-fit:cover;}
.spawn-info{flex:1;}
.spawn-name{font-weight:700;color:var(--text-0);margin-bottom:2px;}
.spawn-timer{font-size:.78rem;color:var(--accent);font-weight:600;}
.rarity-badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:2px 8px;font-size:.7rem;font-weight:700;border:1px solid;}
.r-common{color:#c8c8e0;border-color:rgba(200,200,224,.15);}
.r-uncommon{color:#10b981;border-color:rgba(16,185,129,.2);}
.r-rare{color:#3b82f6;border-color:rgba(59,130,246,.2);}
.r-epic{color:#a78bfa;border-color:rgba(124,58,237,.2);}
.r-legendary{color:#f59e0b;border-color:rgba(245,158,11,.2);}

.toast{position:fixed;bottom:24px;right:24px;background:var(--bg-3);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:.875rem;color:var(--text-0);z-index:9999;transform:translateX(120%);transition:transform .3s;}
.toast.show{transform:translateX(0);}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <div style="font-size:2.5rem;margin-bottom:12px;">🍞</div>
    <h1>BreadDex Bot</h1>
    <p>Sign in to activate the bot. Keep this tab open while the bot runs.</p>
    <button class="btn btn-google" onclick="window._fbSignIn()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Sign in with Google
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div id="app">
  <div class="topbar">
    <div class="bot-avatar">🍞</div>
    <div class="bot-info">
      <h1>BreadDex Bot <span style="background:rgba(245,158,11,.15);color:var(--accent);border-radius:4px;padding:1px 6px;font-size:.7rem;">APP</span></h1>
      <p><span class="status-dot"></span><span id="bot-status-text">Initializing...</span></p>
    </div>
    <div style="margin-left:auto;display:flex;gap:10px;align-items:center;">
      <span style="font-size:.8rem;color:var(--text-2);" id="topbar-user"></span>
      <button class="btn btn-ghost btn-sm" onclick="window._fbSignOut()">Sign out</button>
    </div>
  </div>

  <div class="main">
    <!-- LEFT: SETUP -->
    <div style="display:flex;flex-direction:column;gap:16px;">
      <div class="panel">
        <h2>⚙️ Bot Setup</h2>
        <div class="form-group">
          <label>Active Server</label>
          <select id="server-select" onchange="onServerSelect(this.value)">
            <option value="">— Select a server —</option>
          </select>
        </div>
        <div class="form-group">
          <label>Bot Channel</label>
          <select id="channel-select" onchange="onChannelSelect(this.value)">
            <option value="">— Select a channel —</option>
          </select>
        </div>
        <div style="margin-top:16px;display:flex;flex-direction:column;gap:8px;">
          <div class="toggle-row">
            <span class="toggle-label">BreadDex Active</span>
            <div class="toggle" id="bot-toggle" onclick="toggleBot()"></div>
          </div>
          <div class="toggle-row">
            <span class="toggle-label">Moldy bread fallback</span>
            <div class="toggle on" id="moldy-toggle" onclick="this.classList.toggle('on')"></div>
          </div>
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:16px;" onclick="saveConfig()">💾 Save Config</button>
      </div>

      <div class="panel">
        <h2>📊 Session Stats</h2>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div style="background:var(--bg-3);border-radius:8px;padding:12px;text-align:center;">
            <div style="font-size:1.5rem;font-weight:800;color:var(--text-0);" id="stat-spawned">0</div>
            <div style="font-size:.72rem;color:var(--text-2);">Spawned</div>
          </div>
          <div style="background:var(--bg-3);border-radius:8px;padding:12px;text-align:center;">
            <div style="font-size:1.5rem;font-weight:800;color:var(--green);" id="stat-caught">0</div>
            <div style="font-size:.72rem;color:var(--text-2);">Caught</div>
          </div>
          <div style="background:var(--bg-3);border-radius:8px;padding:12px;text-align:center;">
            <div style="font-size:1.5rem;font-weight:800;color:var(--accent);" id="stat-expired">0</div>
            <div style="font-size:.72rem;color:var(--text-2);">Expired</div>
          </div>
          <div style="background:var(--bg-3);border-radius:8px;padding:12px;text-align:center;">
            <div style="font-size:1.5rem;font-weight:800;color:var(--red);" id="stat-moldy">0</div>
            <div style="font-size:.72rem;color:var(--text-2);">Moldy</div>
          </div>
        </div>
      </div>

      <div class="panel">
        <h2>🍞 Active Spawns</h2>
        <div id="active-spawns"><div style="color:var(--text-3);font-size:.8rem;">No active spawns.</div></div>
      </div>
    </div>

    <!-- RIGHT: LOG -->
    <div class="panel log-area">
      <div class="log-header">
        <h2 style="font-size:.95rem;font-weight:700;color:var(--text-0);">📋 Bot Log</h2>
        <button class="btn btn-ghost btn-sm" onclick="clearLog()">Clear</button>
      </div>
      <div class="log-scroll" id="log"></div>
    </div>
  </div>
</div>

<script>
const ADMIN_UID = 'O3AFfnSv7KUQlUgzX3b6TxWbsX93';
const RARITY_ICONS  = {common:'⬜',uncommon:'🟩',rare:'🟦',epic:'🟪',legendary:'🟨'};
const RARITY_WEIGHTS = {common:50,uncommon:25,rare:15,epic:8,legendary:2};
const SPAWN_TIMEOUT  = 30 * 1000;       // 30 seconds to answer
const MOLDY_TIMEOUT  = 3 * 60 * 60 * 1000; // 3 hours until moldy
const MINE_COOLDOWN  = 5 * 60 * 1000;   // 5 min cooldown per user

let currentUser  = null;
let allBreads    = [];
let allServers   = [];
let selectedServerId  = '';
let selectedChannelId = '';
let botActive    = false;
let activeSpawns = {}; // channelId -> { bread, ts, msgId, timers... }
let stats        = { spawned:0, caught:0, expired:0, moldy:0 };
let mineCooldowns = {}; // uid -> ts

function fbRef(p){ return window._fbRef(window._db,p); }
function fbSet(p,v){ return window._fbSet(fbRef(p),v); }
async function fbGet(p){ return window._fbGet(fbRef(p)); }
function fbRemove(p){ return window._fbRemove(fbRef(p)); }
function fbOn(p,cb){ return window._fbOnValue(fbRef(p),cb); }
function fbOnChild(p,cb){ return window._fbOnChildAdded(fbRef(p),cb); }

document.addEventListener('firebase-ready',()=>{
  window._fbOnAuth(async user=>{
    if(!user){ document.getElementById('auth-screen').style.display='flex'; return; }
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app').classList.add('visible');
    document.getElementById('topbar-user').textContent = user.displayName||user.email;
    currentUser = user;
    await loadBreads();
    await loadServers();
    listenMessages();
    setStatus('Ready — select a server and channel');
    addLog('system','BreadDex Bot started. Waiting for /mine commands.');
  });
});

async function loadBreads(){
  const snap = await fbGet('botdata/breaddex/breads');
  allBreads = snap.exists() ? Object.values(snap.val()) : [];
  addLog('info',`Loaded ${allBreads.length} breads from database.`);
}

async function loadServers(){
  const snap = await fbGet('state/servers');
  if(!snap.exists()){ addLog('warn','No servers found.'); return; }
  const val = snap.val();
  allServers = Array.isArray(val) ? val : Object.values(val||{});
  const sel = document.getElementById('server-select');
  allServers.forEach(s=>{
    const opt = document.createElement('option');
    opt.value = s.id; opt.textContent = (s.icon||'🖥️')+' '+s.name;
    sel.appendChild(opt);
  });
  addLog('info',`Found ${allServers.length} servers.`);

  // Load saved config
  const cfg = await fbGet('botdata/servers');
  if(cfg.exists()){
    const cfgVal = cfg.val();
    Object.entries(cfgVal).forEach(([srvId,data])=>{
      if(data.breaddexEnabled){
        addLog('success',`BreadDex was active on server "${data.name}". Re-activating...`);
        document.getElementById('server-select').value = srvId;
        onServerSelect(srvId, data.breaddexChannel);
      }
    });
  }
}

function onServerSelect(srvId, preselectedChannel){
  selectedServerId = srvId;
  const sel = document.getElementById('channel-select');
  sel.innerHTML = '<option value="">— Select a channel —</option>';
  if(!srvId) return;
  const srv = allServers.find(s=>s.id===srvId);
  if(!srv) return;
  (srv.channels||[]).forEach(cat=>{
    (cat.children||[]).forEach(ch=>{
      if(ch.type==='text'){
        const opt = document.createElement('option');
        opt.value = ch.id; opt.textContent = '# '+ch.name;
        sel.appendChild(opt);
      }
    });
  });
  if(preselectedChannel){ sel.value = preselectedChannel; onChannelSelect(preselectedChannel); }
}

function onChannelSelect(chId){
  selectedChannelId = chId;
}

async function saveConfig(){
  if(!selectedServerId||!selectedChannelId){ showToast('⚠️ Select server and channel first'); return; }
  const srv = allServers.find(s=>s.id===selectedServerId);
  await fbSet('botdata/servers/'+selectedServerId,{
    name: srv?.name||selectedServerId,
    icon: srv?.icon||'🖥️',
    breaddexEnabled: document.getElementById('bot-toggle').classList.contains('on'),
    breaddexChannel: selectedChannelId,
  });
  showToast('✅ Config saved!');
  addLog('success','Config saved to Firebase.');
}

function toggleBot(){
  const t = document.getElementById('bot-toggle');
  t.classList.toggle('on');
  botActive = t.classList.contains('on');
  if(botActive){
    setStatus('Active — listening for /mine commands');
    addLog('success','Bot activated!');
  } else {
    setStatus('Paused');
    addLog('warn','Bot paused.');
  }
}

// ── LISTEN FOR MESSAGES ──
let _listenedChannels = new Set();
function listenMessages(){
  // Listen to all Nova servers' messages
  fbOn('state/servers', snap=>{
    if(!snap.exists()) return;
    const val = snap.val();
    const servers = Array.isArray(val)?val:Object.values(val||{});
    servers.forEach(srv=>{
      (srv.channels||[]).forEach(cat=>{
        (cat.children||[]).forEach(ch=>{
          if(ch.type==='text' && !_listenedChannels.has(ch.id)){
            _listenedChannels.add(ch.id);
            listenChannel(ch.id, srv.id);
          }
        });
      });
    });
  });
}

function listenChannel(channelId, serverId){
  // Only process messages from the configured channel when bot is active
  let firstLoad = true;
  fbOnChild('state/messages/'+channelId, snap=>{
    if(firstLoad){ firstLoad=false; return; } // skip history
    const msg = snap.val();
    if(!msg || !msg.content) return;
    if(msg.uid === 'bot_breaddex') return; // ignore own messages

    const content = msg.content.trim().toLowerCase();

    // /mine command
    if(content === '/mine'){
      if(!botActive || channelId !== selectedChannelId) return;
      handleMine(msg, channelId, serverId);
      return;
    }

    // /breaddex command — show user's collection
    if(content === '/breaddex'){
      if(channelId !== selectedChannelId) return;
      handleBreaddex(msg, channelId);
      return;
    }

    // Check if it's an answer to an active spawn
    if(activeSpawns[channelId]){
      checkAnswer(msg, channelId, serverId);
    }
  });
}

async function handleMine(triggerMsg, channelId, serverId){
  // Cooldown check
  const lastMine = mineCooldowns[triggerMsg.uid] || 0;
  const elapsed  = Date.now() - lastMine;
  if(elapsed < MINE_COOLDOWN){
    const remaining = Math.ceil((MINE_COOLDOWN - elapsed) / 60000);
    await sendBotMessage(channelId, `⏳ **${triggerMsg.name}**, your pickaxe is cooling down! Wait **${remaining} more minute${remaining>1?'s':''}** before mining again.`);
    return;
  }

  // Already a spawn active?
  if(activeSpawns[channelId]){
    await sendBotMessage(channelId, `⚠️ There's already a bread up for grabs! Name it first!`);
    return;
  }

  if(!allBreads.length){ await sendBotMessage(channelId,'❌ No breads in the database yet.'); return; }

  // Pick random bread by rarity
  const bread = pickRandomBread();
  mineCooldowns[triggerMsg.uid] = Date.now();
  stats.spawned++;
  updateStats();

  // Register active spawn
  activeSpawns[channelId] = {
    bread,
    ts: Date.now(),
    triggeredBy: triggerMsg.uid,
    triggeredByName: triggerMsg.name,
  };

  // Send spawn message
  const rarityColor = {common:'⬜',uncommon:'🟩',rare:'🟦',epic:'🟪',legendary:'🟨'}[bread.rarity];
  await sendBotMessage(channelId,
    `🍞 **${triggerMsg.name}** started mining and discovered a mysterious bread!\n\n`+
    `${rarityColor} **Rarity:** ${cap(bread.rarity)}\n`+
    (bread.imageUrl ? `🖼️ *${bread.imageUrl}*\n` : '')+
    `\n⚡ **What's the name of this bread? First to answer wins!**\n`+
    `⏱️ You have **30 seconds** — or it goes stale!`
  );
  if(bread.imageUrl) await sendBotImage(channelId, bread.imageUrl, bread.name);

  addLog('warn',`🍞 Bread spawned in #${channelId}: ${bread.name} (${bread.rarity}) — triggered by ${triggerMsg.name}`);

  // Expire after 30s — becomes moldy after 3h
  activeSpawns[channelId].expireTimer = setTimeout(()=>expireSpawn(channelId), SPAWN_TIMEOUT);
  renderActiveSpawns();
}

function pickRandomBread(){
  // Weighted random by rarity
  const pool = [];
  allBreads.forEach(b=>{
    const w = RARITY_WEIGHTS[b.rarity]||50;
    for(let i=0;i<w;i++) pool.push(b);
  });
  return pool[Math.floor(Math.random()*pool.length)];
}

async function checkAnswer(msg, channelId){
  const spawn = activeSpawns[channelId];
  if(!spawn) return;
  const answer = msg.content.trim().toLowerCase();
  const aliases = spawn.bread.aliases || [spawn.bread.name.toLowerCase()];
  const correct  = aliases.some(a=>a.toLowerCase()===answer);
  if(!correct) return;

  // CORRECT! Clear expire timer
  clearTimeout(spawn.expireTimer);
  delete activeSpawns[channelId];

  stats.caught++;
  updateStats();

  // Check if user already has this bread
  const capSnap = await fbGet('botdata/captures/'+msg.uid+'/breaddex/'+spawn.bread.id);
  if(capSnap.exists()){
    await sendBotMessage(channelId,
      `✅ **${msg.name}** got it — **${spawn.bread.name}**!\n`+
      `But you already have this bread in your BreadDex. 📦 Duplicate!`
    );
  } else {
    // Save capture
    await fbSet('botdata/captures/'+msg.uid+'/breaddex/'+spawn.bread.id,{
      ...spawn.bread, caughtAt: Date.now(), caughtBy: msg.uid, userName: msg.name,
    });
    await fbSet('botdata/captures/'+msg.uid+'/userName', msg.name);
    await sendBotMessage(channelId,
      `🎉 **${msg.name}** caught it! **${spawn.bread.name}** added to your BreadDex!\n`+
      `${RARITY_ICONS[spawn.bread.rarity]} **${cap(spawn.bread.rarity)}** bread secured! 🍞`
    );
    addLog('success',`✅ ${msg.name} caught ${spawn.bread.name} (${spawn.bread.rarity})`);
  }
  renderActiveSpawns();
}

async function expireSpawn(channelId){
  const spawn = activeSpawns[channelId];
  if(!spawn) return;

  stats.expired++;
  updateStats();

  const moldyEnabled = document.getElementById('moldy-toggle').classList.contains('on');
  if(moldyEnabled){
    // Mark as moldy, available for 3 hours
    activeSpawns[channelId] = {
      ...spawn,
      moldy: true,
      moldyTs: Date.now(),
    };
    await sendBotMessage(channelId,
      `⏰ The bread wasn't named in time... it's getting **moldy!** 🍄\n`+
      `You have **3 hours** to claim it as **Moldy Bread** (Common) by typing \`/mine moldy\``
    );
    activeSpawns[channelId].moldyTimer = setTimeout(()=>removeMoldySpawn(channelId), MOLDY_TIMEOUT);
    addLog('warn',`⏰ Bread expired in #${channelId}, now moldy for 3h`);
  } else {
    delete activeSpawns[channelId];
    await sendBotMessage(channelId,`⏰ Nobody named the bread in time... it crumbled away! 💨`);
  }
  renderActiveSpawns();
}

async function removeMoldySpawn(channelId){
  delete activeSpawns[channelId];
  await sendBotMessage(channelId,`🍄 The moldy bread has completely decomposed... it's gone!`);
  stats.moldy++;
  updateStats();
  renderActiveSpawns();
  addLog('warn',`🍄 Moldy bread fully expired in #${channelId}`);
}

async function handleBreaddex(msg, channelId){
  const snap = await fbGet('botdata/captures/'+msg.uid+'/breaddex');
  if(!snap.exists()){
    await sendBotMessage(channelId,`📖 **${msg.name}'s BreadDex** is empty! Use \`/mine\` to start collecting!`);
    return;
  }
  const collection = Object.values(snap.val());
  const byRarity = {};
  collection.forEach(b=>{ if(!byRarity[b.rarity])byRarity[b.rarity]=[];byRarity[b.rarity].push(b.name); });
  let text = `📖 **${msg.name}'s BreadDex** — ${collection.length}/${allBreads.length} breads\n\n`;
  ['legendary','epic','rare','uncommon','common'].forEach(r=>{
    if(byRarity[r]) text += `${RARITY_ICONS[r]} **${cap(r)}:** ${byRarity[r].join(', ')}\n`;
  });
  await sendBotMessage(channelId, text);
}

// ── SEND MESSAGES ──
async function sendBotMessage(channelId, content){
  if(!channelId) return;
  const id = 'msg'+Math.random().toString(36).substring(2,12);
  await fbSet('state/messages/'+channelId+'/'+id,{
    id, uid:'bot_breaddex', name:'PanDex', color:'#f59e0b',
    avatarUrl:'', content, ts:Date.now(), reactions:[], pinned:false,
  });
}

async function sendBotImage(channelId, imageUrl, name){
  if(!channelId||!imageUrl) return;
  const id = 'msg'+Math.random().toString(36).substring(2,12);
  await fbSet('state/messages/'+channelId+'/'+id,{
    id, uid:'bot_breaddex', name:'PanDex', color:'#f59e0b',
    avatarUrl:'', content:'', imageUrl, ts:Date.now()+1, reactions:[], pinned:false,
  });
}

// ── UI ──
function renderActiveSpawns(){
  const el = document.getElementById('active-spawns');
  const spawns = Object.entries(activeSpawns);
  if(!spawns.length){ el.innerHTML='<div style="color:var(--text-3);font-size:.8rem;">No active spawns.</div>'; return; }
  el.innerHTML = spawns.map(([chId,s])=>`
    <div class="spawn-card">
      <div class="spawn-img">${s.bread.imageUrl?`<img src="${s.bread.imageUrl}" onerror="this.parentElement.textContent='🍞'">`:'🍞'}</div>
      <div class="spawn-info">
        <div class="spawn-name">${s.moldy?'🍄 Moldy Bread':s.bread.name}</div>
        <div style="margin:3px 0;"><span class="rarity-badge r-${s.moldy?'common':s.bread.rarity}">${RARITY_ICONS[s.moldy?'common':s.bread.rarity]} ${s.moldy?'Common (Moldy)':cap(s.bread.rarity)}</span></div>
        <div class="spawn-timer">${s.moldy?'⏳ Moldy — expires in 3h':'⏱️ 30s to answer'}</div>
      </div>
      <button class="btn btn-danger btn-sm" onclick="forceExpire('${chId}')">Force expire</button>
    </div>`).join('');
}

async function forceExpire(channelId){
  clearTimeout(activeSpawns[channelId]?.expireTimer);
  clearTimeout(activeSpawns[channelId]?.moldyTimer);
  delete activeSpawns[channelId];
  await sendBotMessage(channelId,'💨 Spawn removed by admin.');
  renderActiveSpawns();
}

function updateStats(){
  document.getElementById('stat-spawned').textContent=stats.spawned;
  document.getElementById('stat-caught').textContent=stats.caught;
  document.getElementById('stat-expired').textContent=stats.expired;
  document.getElementById('stat-moldy').textContent=stats.moldy;
}

function addLog(type, msg){
  const el = document.getElementById('log');
  const time = new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const div = document.createElement('div');
  div.className='log-entry '+type;
  div.innerHTML=`<span class="log-time">${time}</span>${msg}`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}
function clearLog(){ document.getElementById('log').innerHTML=''; }
function setStatus(msg){ document.getElementById('bot-status-text').textContent=msg; }
function showToast(msg){ const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),3000); }
function cap(s){ return s?s[0].toUpperCase()+s.slice(1):''; }
</script>
